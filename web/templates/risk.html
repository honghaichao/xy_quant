<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>风控仪表盘</title>
<style>
  :root { --bg:#0f172a; --card:#1e293b; --text:#e2e8f0; --muted:#94a3b8; --green:#34d399; --red:#f87171; --blue:#38bdf8; --orange:#fb923c; --yellow:#fbbf24; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",monospace; padding:16px; }
  a { color:var(--blue); text-decoration:none; }
  .nav { margin-bottom:12px; font-size:14px; }
  .kpi { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:16px; }
  .kpi>div { background:var(--card); border-radius:8px; padding:12px 18px; font-size:13px; min-width:130px; text-align:center; }
  .kpi .v { font-size:24px; font-weight:700; }
  .kpi .hi{color:var(--red)} .kpi .ok{color:var(--green)} .kpi .warn{color:var(--orange)}
  .card { background:var(--card); border-radius:8px; padding:12px; margin-bottom:16px; }
  .card h3 { font-size:15px; margin-bottom:8px; color:var(--muted); }
  table { width:100%; font-size:13px; border-collapse:collapse; }
  th { padding:6px 8px; text-align:right; color:var(--muted); font-weight:500; border-bottom:1px solid #334155; }
  th:first-child, td:first-child { text-align:left; }
  td { padding:5px 8px; border-bottom:1px solid #1e293b; }
  .up { color:var(--green); } .down { color:var(--red); } .warn { color:var(--orange); }
  .row { display:flex; gap:16px; }
  .row>.card { flex:1; }
  .bar-wrap { background:#334155; border-radius:4px; height:12px; overflow:hidden; }
  .bar-fill { height:12px; border-radius:4px; }
</style>
</head>
<body>
<div class="nav"><a href="/">首页</a> <a href="/factors">因子</a> <a href="/live">实盘</a> <a href="/risk">风控</a> <a href="/strategy-editor">编辑器</a> <a href="/money-flow">资金流</a></div>
<div class="kpi" id="kpi"></div>
<div class="row">
  <div class="card"><h3>📊 策略集中度</h3><table><thead><tr><th>策略</th><th>市值</th><th>占比</th></tr></thead><tbody id="strat_tbl"></tbody></table></div>
  <div class="card"><h3>⚠️ 风控快照</h3>
    <p style="font-size:13px;margin-bottom:8px;"><span class="muted">总收益</span> &nbsp;
    <span id="ret_pct" class="hi v">0%</span></p>
    <p style="font-size:13px;margin-bottom:12px;"><span class="muted">单票上限 30% | 当前最大单票占比</span> &nbsp;
    <span id="max_single" class="hi v">0%</span></p>
    <div class="bar-wrap"><div class="bar-fill" id="single_bar" style="width:0;background:var(--red);"></div></div>
    <p style="font-size:11px;color:var(--muted);margin-top:4px;">单票 ≤ 30% 为安全线 | 连续下跌超 5% 触发止损预警</p>
  </div>
</div>
<div class="card"><h3>💼 持仓风险明细</h3>
<table><thead><tr><th>代码</th><th>名称</th><th>策略</th><th>成本</th><th>现价</th><th>市值</th><th>盈亏%</th><th>止损预警</th><th>买入日</th></tr></thead><tbody id="detail_tbl"></tbody></table></div>
<div class="card"><h3>🔔 当日卖出信号（命中持仓）</h3><table><thead><tr><th>代码</th><th>名称</th><th>现价</th><th>S1分数</th><th>卖出原因</th><th>信号日</th></tr></thead><tbody id="sell_tbl"><tr><td colspan="6" class="muted">加载中...</td></tr></tbody></table></div>

<script>
(async()=>{
  const r=await fetch('/api/risk/summary'); const d=await r.json(); var d2=d;
  if(d.error){document.getElementById('kpi').innerHTML=d.error;return;}

  document.getElementById('kpi').innerHTML=`
    <div>持仓数<div class="v ok">${d.total_positions}</div></div>
    <div>组合市值<div class="v">¥${d.total_value.toLocaleString()}</div></div>
    <div>最大单票占比<div class="v ${d.max_single_pct>30?'hi':'ok'}">${d.max_single_pct}%</div></div>
    <div>当前收益<div class="v ${d.current_return_pct>=0?'ok':'hi'}">${d.current_return_pct}%</div></div>
    <div>风险集中<div class="v warn">${d.max_strategy||''}</div></div>
  `;
  document.getElementById('max_single').innerText=d.max_single_pct+'%';
  document.getElementById('single_bar').style.width=Math.min(d.max_single_pct,100)+'%';
  // dd_line element removed — no longer present in template

  // 策略集中度排序（降序）
  const strat_sorted=Object.entries(d.strategy_concentration||{}).sort((a,b)=>b[1]-a[1]);
  document.getElementById('strat_tbl').innerHTML=strat_sorted.map(([k,v])=>
    `<tr><td>${k}</td><td>¥${(v*d.total_value/100).toFixed(0)}</td><td>${v}%</td></tr>`).join('');

  // 持仓明细表排序支持（按代码字典序稳定）
  const sorted_holdings=[...d.holdings].sort((a,b)=>a.code.localeCompare(b.code));
  document.getElementById('detail_tbl').innerHTML=sorted_holdings.map(h=>
    `<tr>
      <td><a href="/stock/${h.code}" target="_blank">${h.code}</a></td><td>${h.name}</td><td>${h.strategy}</td>
      <td>￥${h.buy_price}</td><td>￥${h.current_price}</td><td>￥${h.market_value.toLocaleString()}</td>
      <td class="${h.pnl_pct>=0?'up':'down'}">${h.pnl_pct}%</td>
      <td class="${h.stop_loss_warn?'warn':''}">${h.stop_loss_warn?'⚠ '+h.stop_reason:'✓'}</td>
      <td class="muted">${h.buy_date}</td>
    </tr>`).join('');
  fetch('/api/signals').then(r=>r.json()).then(d=>{
    const holdings=new Set((d2.holdings||[]).map(h=>h.code));
    const sells=(d.signals||[]).filter(s=>{
      return (s.sell_signals||[]).length>0 && holdings.has(s.code);
    }).map(s=>{
      const reasons=s.sell_signals?s.sell_signals.map(ss=>ss.strategy).join(','):'';
      return '<tr><td><a href="/stock/'+s.code+'" target="_blank">'+s.code+'</a></td><td>'+s.name+'</td><td>'+s.close+'</td><td>'+((s.sell_signals&&s.sell_signals[0]?.score)||'-')+'</td><td style=color:var(--red)>'+reasons+'</td><td>'+d.date+'</td></tr>';
    }).join('');
    document.getElementById('sell_tbl').innerHTML=sells||'<tr><td colspan=6 class=muted>✅ 今日无卖出信号</td></tr>';
  });
})();
</script>
</body>
</html>
