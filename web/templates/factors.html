<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>因子分析仪表盘</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
<style>
  :root { --bg:#0f172a; --card:#1e293b; --text:#e2e8f0; --muted:#94a3b8; --blue:#38bdf8; --green:#34d399; --red:#f87171; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",monospace; padding:16px; }
  a { color:var(--blue); text-decoration:none; }
  .nav { margin-bottom:16px; font-size:14px; }
  .kpi { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:16px; }
  .kpi>div { background:var(--card); border-radius:8px; padding:12px 18px; font-size:14px; min-width:140px; }
  .kpi .v { font-size:28px; font-weight:700; color:var(--blue); }
  .panel { display:flex; gap:16px; }
  .table-wrap { flex:0 0 420px; max-height:560px; overflow-y:auto; background:var(--card); border-radius:8px; padding:12px; }
  .table-wrap table { width:100%; font-size:13px; border-collapse:collapse; }
  .table-wrap thead th { position:sticky; top:0; background:#334155; padding:6px 8px; text-align:right; color:var(--muted); font-weight:500; }
  .table-wrap thead th:first-child, .table-wrap td:first-child { text-align:left; }
  .table-wrap td { padding:5px 8px; border-bottom:1px solid #1e293b; cursor:pointer; }
  .table-wrap tr:hover td { background:#334155; }
  .table-wrap .dir-up { color:var(--green); } .dir-down { color:var(--red); }
  .chart { flex:1; background:var(--card); border-radius:8px; padding:12px; min-height:500px; }
  .chart h3 { margin-bottom:8px; }
</style>
</head>
<body>
<div class="nav">
  <a href="/">首页</a> <a href="/factors">因子</a> <a href="/live">实盘</a> <a href="/risk">风控</a> <a href="/strategy-editor">编辑器</a> <a href="/money-flow">资金流</a>
</div>
<div class="kpi" id="kpi"></div>
<div class="card" style="margin-bottom:16px"><h3 style="margin-bottom:8px;color:var(--muted)">🎯 今日因子选股 Top 30</h3><div id="top_picks" style="font-size:13px;display:flex;flex-wrap:wrap;gap:6px"></div></div>
<div class="panel">
  <div class="table-wrap"><table><thead><tr>
    <th>因子</th><th>|IC|</th><th>std</th><th>IR</th><th>n</th><th>方向</th>
  </tr></thead><tbody id="tbl"></tbody></table></div>
  <div class="chart"><h3 id="chart_title">点击因子名查看 IC 序列</h3><div id="chart" style="width:100%;height:480px;"></div></div>
</div>
<script>
let all=[],sel=null,chartE=null;
(async()=>{
  const r=await fetch('/api/factors/rank'); const d=await r.json();
  all=d.factors; renderKPI(d); renderTopPicks(); renderTable(d.factors);
  chartE=echarts.init(document.getElementById('chart'));
  setTimeout(()=>chartE.resize(),100);
})();
function renderKPI(d){document.getElementById('kpi').innerHTML=`
  <div>总因子数<div class="v">${d.total}</div></div>
  <div>IC>0.05<div class="v">${d.factors.filter(f=>f.abs_ic_mean>0.05).length}</div></div>
  <div>均值|IC|<div class="v">${(d.factors.reduce((s,f)=>s+f.abs_ic_mean,0)/d.total).toFixed(3)}</div></div>
  <div>最强因子<div class="v">${d.factors[0]?.factor_name||'-'}</div></div>
`;}
async function renderTopPicks(){
  try{
    const r=await fetch('/api/factors/snapshot');const d=await r.json();
    if(d.error){document.getElementById('top_picks').innerHTML='<span style=color:var(--muted)>'+d.error+'</span>';return;}
    document.getElementById('top_picks').innerHTML=d.top_stocks.map(s=>{
      const tags=s.signal_types.length?s.signal_types.map(t=>'<span style=background:#334155;border-radius:3px;padding:1px 4px;font-size:11px>'+t+'</span>').join(''):'';
      return '<span style=display:inline-block;background:var(--card);padding:4px 8px;border-radius:4px;white-space:nowrap><a href="/stock/'+s.code+'" target="_blank"><b>'+s.code+'</b></a> <span style=color:var(--blue)>'+s.score.toFixed(2)+'</span> '+tags+'</span>';
    }).join(' ');
  }catch(e){}
}
function renderTable(list){
  document.getElementById('tbl').innerHTML=list.map(f=>`
    <tr onclick="loadIC('${f.factor_name}')" id="row_${f.factor_name}">
      <td>${f.factor_name}</td><td>${f.abs_ic_mean}</td><td>${f.ic_std}</td><td>${f.ic_ir}</td><td>${f.n_days}</td>
      <td class="${f.direction>0?'dir-up':'dir-down'}">${f.direction>0?'▲ 正':'▼ 负'}</td>
    </tr>`).join('');
}
async function loadIC(name){
  sel=name; document.getElementById('chart_title').innerText=`${name} — 每日 IC 序列`;
  document.querySelectorAll('tr').forEach(r=>r.style.background='');
  const row=document.getElementById('row_'+name); if(row)row.style.background='#334155';
  const r=await fetch('/api/factors/'+encodeURIComponent(name)+'/ic'); const d=await r.json();
  chartE.setOption({
    tooltip:{trigger:'axis'}, toolbox:{feature:{saveAsImage:{}}},
    legend:{data:['IC','累计IC'],textStyle:{color:'#94a3b8'}},
    grid:{left:60,right:80,top:40,bottom:50},
    xAxis:{type:'category',data:d.dates,axisLabel:{color:'#94a3b8',rotate:45}},
    yAxis:[
      {type:'value',name:'IC',axisLabel:{color:'#94a3b8'},splitLine:{lineStyle:{color:'#1e293b'}}},
      {type:'value',name:'累计IC',axisLabel:{color:'#94a3b8'},splitLine:{show:false}}
    ],
    series:[
      {name:'IC',type:'bar',yAxisIndex:0,data:d.ic.map((v)=>({value:v,itemStyle:{color:v>=0?'#34d399':'#f87171'}}))},
      {name:'累计IC',type:'line',yAxisIndex:1,data:d.cumulative_ic,lineStyle:{color:'#38bdf8',width:2},symbol:'none'},
    ]
  });
}
window.addEventListener('resize',()=>chartE?.resize());</script>
</body>
</html>
