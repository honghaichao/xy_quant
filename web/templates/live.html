<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>实盘组合跟踪</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
<style>
  :root { --bg:#0f172a; --card:#1e293b; --text:#e2e8f0; --muted:#94a3b8; --green:#34d399; --red:#f87171; --blue:#38bdf8; --yellow:#fbbf24; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",monospace; padding:16px; }
  a { color:var(--blue); text-decoration:none; }
  .nav { margin-bottom:12px; font-size:14px; }
  .kpi { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:16px; }
  .kpi>div { background:var(--card); border-radius:8px; padding:12px 18px; font-size:13px; min-width:130px; }
  .kpi .v { font-size:24px; font-weight:700; } .kpi .up{color:var(--green)} .kpi .down{color:var(--red)}
  .intraday-bar { display:flex; gap:6px; align-items:center; height:24px; border-radius:4px; overflow:hidden; margin:4px 0; }
  .intraday-bar .seg-up { background:var(--green); }
  .intraday-bar .seg-down { background:var(--red); }
  .intraday-bar .seg-flat { background:#475569; }
  .row { display:flex; gap:16px; margin-bottom:16px; }
  .card { background:var(--card); border-radius:8px; padding:12px; flex:1; }
  .card h3 { font-size:15px; margin-bottom:8px; color:var(--muted); }
  table { width:100%; font-size:13px; border-collapse:collapse; }
  th { padding:6px 8px; text-align:right; color:var(--muted); font-weight:500; border-bottom:1px solid #334155; }
  th:first-child, td:first-child { text-align:left; }
  td { padding:5px 8px; border-bottom:1px solid #1e293b; }
  .badge { display:inline-block; padding:2px 8px; border-radius:12px; font-size:12px; }
  .badge-pending{background:var(--yellow);color:#000} .badge-executed{background:var(--green);color:#000}
  .up { color:var(--green); } .down { color:var(--red); } .muted { color:var(--muted); font-size:12px; }
  #nav_chart { width:100%; height:300px; }
  .tab-btn { background:var(--card); border:1px solid #334155; color:var(--text); padding:4px 12px; border-radius:6px; cursor:pointer; font-size:13px; }
  .tab-btn.active { border-color:var(--blue); color:var(--blue); }
</style>
</head>
<body>
<div class="nav"><a href="/">首页</a> <a href="/factors">因子</a> <a href="/live">实盘</a> <a href="/risk">风控</a> <a href="/strategy-editor">编辑器</a> <a href="/money-flow">资金流</a></div>

<!-- 盘中数据卡片 -->
<div class="card" style="margin-bottom:16px">
  <h3>📡 盘中快照 <span class="muted" id="intra_time"></span></h3>
  <div class="row">
    <div style="flex:1;min-width:200px">
      <div style="font-size:13px;margin-bottom:4px">市场宽度</div>
      <div style="display:flex;gap:12px;font-size:13px;margin-bottom:4px">
        <span class="up" id="bread_up">-</span>
        <span class="down" id="bread_down">-</span>
        <span class="muted" id="bread_flat">-</span>
      </div>
      <div class="intraday-bar" id="breadth_bar" style="width:100%"></div>
    </div>
    <div style="flex:1;min-width:150px">
      <div style="font-size:13px;margin-bottom:4px">上证指数</div>
      <div id="sh_idx" style="font-size:20px;font-weight:700" class="muted">-</div>
      <div id="sh_idx_pct" style="font-size:13px" class="muted">-</div>
    </div>
    <div style="flex:1;min-width:150px">
      <div style="font-size:13px;margin-bottom:4px">资金流（个股）</div>
      <div class="muted" id="ff_stock">-</div>
    </div>
    <div style="flex:1;min-width:150px">
      <div style="font-size:13px;margin-bottom:4px">资金流（板块）</div>
      <div class="muted" id="ff_sector">-</div>
    </div>
  </div>
</div>

<div class="tabs" style="display:flex;gap:8px;margin-bottom:12px">
  <button onclick="switchTab('all')" id="tab_all" class="tab-btn active">📊 全部持仓</button>
  <button onclick="switchTab('jq')" id="tab_jq" class="tab-btn">🐟 菜场大妈(JQ)</button>
  <button onclick="switchTab('sig')" id="tab_sig" class="tab-btn">📡 信号策略</button>
</div>
<div class="kpi" id="kpi"></div>
<div class="row">
  <div class="card"><h3>📈 净值曲线</h3><div id="nav_chart"></div></div>
</div>
<div class="row">
  <div class="card"><h3>💼 当前持仓</h3><table><thead><tr><th>代码</th><th>名称</th><th>股数</th><th>买价</th><th>现价</th><th>盈亏%</th><th>策略</th></tr></thead><tbody id="hold_tbl"></tbody></table></div>
  <div class="card"><h3>📦 订单队列</h3><table><thead><tr><th>日期</th><th>代码</th><th>方向</th><th>参考价</th><th>股数</th><th>状态</th></tr></thead><tbody id="order_tbl"></tbody></table></div>
</div>
<div class="card"><h3>📜 交易历史</h3><table><thead><tr><th>日期</th><th>代码</th><th>名称</th><th>方向</th><th>价格</th><th>股数</th><th>金额</th><th>盈亏</th><th>理由</th></tr></thead><tbody id="trade_tbl"></tbody></table></div>
<script>
(async()=>{
  const [lr,pr,tr,ir]=await Promise.all([
    fetch('/api/live/summary'),fetch('/api/positions'),fetch('/api/history'),
    fetch('/api/intraday/summary').then(r=>r.json()).catch(()=>({}))
  ]);
  const d=await lr.json(); const pd=await pr.json(); const td=await tr.json();
  // merge all positions (JQ + signal)
  const allHolds=(pd.positions||[]).map(p=>({code:p.code,name:p.name,shares:p.shares,buy_price:p.buy_price,current_price:p.current_price,pnl_pct:p.profit_pct||0,strategy:p.strategy||'?'}));
  const allTrades=(td.history||[]).map(t=>({date:t.buy_date,code:t.code,name:t.name,action:'卖出',price:t.sell_price,shares:t.shares,amount:0,pnl:t.profit_loss,pnl_pct:t.profit_pct,reason:t.sell_reason||'',strategy:t.strategy||'?'}));
  d.all_holdings=allHolds; d.all_trades=[...d.trades.map(t=>({...t,strategy:'JQ_CAIMADAMA'})),...allTrades];
  d.all_nav=d.nav;  // for now, JQ nav only
  allData=d; switchTab('all');
  // KPI
  const nav=d.nav.length?d.nav[d.nav.length-1]:null;
  const ret=nav?.total_return??0;
  document.getElementById('kpi').innerHTML=`
    <div>当前净值<div class="v ${ret>=0?'up':'down'}">¥${nav?.total?.toLocaleString()||'0'}</div></div>
    <div>总收益率<div class="v ${ret>=0?'up':'down'}">${ret.toFixed(2)}%</div></div>
    <div>现金<div class="v">¥${nav?.cash?.toLocaleString()||'0'}</div></div>
    <div>持仓市值<div class="v">¥${nav?.position_value?.toLocaleString()||'0'}</div></div>
    <div>订单待处理<div class="v">${d.orders?.length||0}</div></div>
  `;

  // ── Intraday data card ──
  renderIntraday(ir);

  // 净值曲线
  const chart=echarts.init(document.getElementById('nav_chart'));
  // 基准线：上证指数
  const idxData=await fetch('/api/equity-curve').then(r=>r.json());
  const idxVals=idxData.benchmark||[];
  chart.setOption({
    tooltip:{trigger:'axis'}, grid:{left:70,right:20,top:10,bottom:30},
    legend:{data:['净值','上证指数'],textStyle:{color:'#94a3b8'}},
    xAxis:{type:'category',data:d.nav.map(n=>n.date),axisLabel:{color:'#94a3b8'}},
    yAxis:{type:'value',axisLabel:{color:'#94a3b8'},splitLine:{lineStyle:{color:'#1e293b'}}},
    series:[
      {name:'净值',type:'line',data:d.nav.map(n=>n.total),lineStyle:{color:'#38bdf8',width:2},smooth:true,areaStyle:{color:'rgba(56,189,248,0.1)'}},
      {name:'上证指数',type:'line',data:idxVals.slice(-d.nav.length),lineStyle:{color:'#fbbf24',width:1,type:'dashed'},symbol:'none'},
    ]
  });
  // 持仓表
  document.getElementById('hold_tbl').innerHTML=d.holdings.length?d.holdings.map(h=>
    `<tr><td><a href="/stock/${h.code}" target="_blank">${h.code}</a></td><td>${h.name}</td><td>${h.shares}</td><td>${h.buy_price}</td><td>${h.current_price}</td><td class="${h.pnl_pct>=0?'up':'down'}">${(h.pnl_pct>=0?'+':'')+h.pnl_pct.toFixed(1)}%</td><td class="muted">${h.strategy||''}</td></tr>`
  ).join(''):'<tr><td colspan="7" class="muted">无持仓</td></tr>';
  // 订单
  document.getElementById('order_tbl').innerHTML=d.orders.length?d.orders.map(o=>
    `<tr><td>${o.trade_date}</td><td><a href="/stock/${o.code}" target="_blank">${o.code}</a> ${o.name}</td><td class="${o.action==='SELL'?'down':'up'}">${o.action}</td><td>${o.price}</td><td>${o.shares}</td><td><span class="badge badge-${o.status||'pending'}">${o.status}</span></td></tr>`
  ).join(''):'<tr><td colspan="6" class="muted">无待处理订单</td></tr>';
  // 交易
  document.getElementById('trade_tbl').innerHTML=d.trades.length?d.trades.map(t=>
    `<tr><td>${t.date}</td><td><a href="/stock/${t.code}" target="_blank">${t.code}</a></td><td>${t.name}</td><td class="${t.action==='卖出'?'down':'up'}">${t.action}</td><td>${t.price}</td><td>${t.shares}</td><td>${t.amount}</td><td class="${t.pnl>=0?'up':'down'}">${t.pnl}</td><td class="muted">${t.reason}</td></tr>`
  ).join(''):'<tr><td colspan="9" class="muted">暂无交易</td></tr>';
let curTab='all',allData=null;
function switchTab(t){
  curTab=t;document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab_'+t).classList.add('active');
  if(!allData) return;
  let h=allData.all_holdings||[], t2=allData.all_trades||[];
  if(t==='jq'){h=h.filter(r=>r.strategy==='JQ_CAIMADAMA');t2=t2.filter(r=>r.strategy==='JQ_CAIMADAMA')}
  if(t==='sig'){h=h.filter(r=>r.strategy!=='JQ_CAIMADAMA');t2=t2.filter(r=>r.strategy!=='JQ_CAIMADAMA')}
  renderHoldings(h); renderTrades(t2);
  // replot nav (all or merged)
  let navData=t==='all'?(allData.all_nav||allData.nav):allData.nav;
  const chart=echarts.init(document.getElementById('nav_chart'));
  chart.setOption({xAxis:{data:navData.map(n=>n.date)},series:[{data:navData.map(n=>n.total)}]});
}
function renderHoldings(hh){
  document.getElementById('hold_tbl').innerHTML=hh.length?hh.map(h=>
    '<tr><td><a href="/stock/'+h.code+'" target="_blank">'+h.code+'</a></td><td>'+h.name+'</td><td>'+h.shares+'</td><td>'+h.buy_price+'</td><td>'+h.current_price+'</td><td class="'+(h.pnl_pct>=0?'up':'down')+'">'+(h.pnl_pct>=0?'+':'')+h.pnl_pct.toFixed(1)+'%</td><td class="muted">'+h.strategy+'</td></tr>'
  ).join(''):'<tr><td colspan=7 class=muted>无持仓</td></tr>';
}
function renderTrades(tt){
  document.getElementById('trade_tbl').innerHTML=tt.length?tt.map(t=>
    '<tr><td>'+t.date+'</td><td><a href="/stock/'+t.code+'" target="_blank">'+t.code+'</a></td><td>'+t.name+'</td><td class="'+(t.action=='卖出'?'down':'up')+'">'+t.action+'</td><td>'+t.price+'</td><td>'+t.shares+'</td><td>'+t.amount+'</td><td class="'+(t.pnl>=0?'up':'down')+'">'+t.pnl+'</td><td class=muted>'+t.reason+'</td></tr>'
  ).join(''):'<tr><td colspan=9 class=muted>暂无交易</td></tr>';
}

// ── Intraday rendering ──
function renderIntraday(ir) {
  if (!ir || !ir.fetch_time) {
    document.getElementById('intra_time').textContent = '(无盘中数据)';
    return;
  }
  document.getElementById('intra_time').textContent = '· ' + ir.fetch_time.replace('T',' ').slice(0,19);

  // Breadth bar
  const b = ir.market_breadth || {};
  const total = (b.up||0) + (b.down||0) + (b.flat||0) || 1;
  const upPct = ((b.up||0)/total*100).toFixed(0);
  const downPct = ((b.down||0)/total*100).toFixed(0);
  const flatPct = ((b.flat||0)/total*100).toFixed(0);
  document.getElementById('bread_up').textContent = `📈 ${b.up} 涨 (${upPct}%)`;
  document.getElementById('bread_down').textContent = `📉 ${b.down} 跌 (${downPct}%)`;
  document.getElementById('bread_flat').textContent = `➖ ${b.flat} 平 (${flatPct}%)`;

  const bar = document.getElementById('breadth_bar');
  bar.innerHTML = `
    <div class="seg-up" style="width:${(b.up||0)/total*100}%"></div>
    <div class="seg-down" style="width:${(b.down||0)/total*100}%"></div>
    <div class="seg-flat" style="width:${(b.flat||0)/total*100}%"></div>`;

  // Shanghai index
  if (ir.shanghai_index) {
    const sh = ir.shanghai_index;
    const cls = (sh.pct_chg>=0) ? 'up' : 'down';
    document.getElementById('sh_idx').innerHTML = '<span class="' + cls + '">' + (sh.close||0).toFixed(2) + '</span>';
    document.getElementById('sh_idx_pct').innerHTML = '<span class="' + cls + '">' + (sh.pct_chg>=0?'+':'') + (sh.pct_chg||0).toFixed(2) + '%</span>';
  }

  // Fund flow stock
  if (ir.top_inflow && ir.top_inflow.length) {
    const tf = ir.top_inflow[0];
    document.getElementById('ff_stock').innerHTML = `
      <span class="up">流入 Top:</span> ${tf.name} (${tf.code}) <span class="up">+${(tf.main_inflow/1e4).toFixed(1)}亿</span>`;
  }

  // Sector flow
  if (ir.sector_flow && ir.sector_flow.length) {
    const sf = ir.sector_flow[0];
    document.getElementById('ff_sector').innerHTML = `
      <span class="up">板块 Top:</span> ${sf.name} <span class="${(sf.main_inflow>=0)?'up':'down'}">${(sf.main_inflow>0?'+':'')}${(sf.main_inflow/1e4).toFixed(1)}亿</span>`;
  }
}
})();
</script>
</body>
</html>
